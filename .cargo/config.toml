[build]
target = "thumbv6m-none-eabi"

[target.thumbv6m-none-eabi]
runner  = "probe-rs run --chip RP2040"
rustflags = [
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "link-arg=--nmagic",
]

[alias]
bloat   = "bloat --release --crates"
sym     = "nm --release -- --print-size --size-sort"
asm     = "objdump --release -- -d --source"
check   = "clippy -- -D warnings"
