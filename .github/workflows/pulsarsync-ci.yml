name: PulsarSync-Core CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: thumbv6m-none-eabi
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --target thumbv6m-none-eabi -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: thumbv6m-none-eabi
      - run: cargo build --release --target thumbv6m-none-eabi

      # Verify that the instruction memory text size fits within our strict 64KB target
      - name: Verify binary size budget
        run: |
          cargo install cargo-binutils --version 0.3.6
          rustup component add llvm-tools-preview
          SIZE=$(cargo size --release --target thumbv6m-none-eabi -- -A | grep '\.text' | awk '{print $2}')
          echo "Binary .text size: ${SIZE} bytes"
          [ "$SIZE" -le "65536" ] || { echo "ERROR: Binary exceeds 64KB budget"; exit 1; }

  test-physics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
      - run: cargo test --target x86_64-unknown-linux-gnu --features host-testing
